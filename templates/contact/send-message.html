<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ehsaan</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/utilities.css" />

  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/auth.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/buttons.css" />
  <link rel="stylesheet" href="../../components/toggle.css" />
  <link rel="stylesheet" href="../../components/panner.css" />
  <link rel="stylesheet" href="../../components/special-form.css" />


  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main>
    <section class="panner">
    </section>

    <section class="contact-form-section">
      <div class="container y-u-max-w-1200">
        <div class="header">
          <img src="../../assets/email-white.svg" alt="أيقونة بريد إلكتروني">
          <h2>يسعدنا إستقبال رسالتك</h2>
        </div>
        <div class="right-left">
          <div class="right">

            <form action="">
              <div class="form-group">
                <div class="group">
                  <label for="name">الاسم ثلاثي</label>
                  <input type="text" id="name" name="name" placeholder="محمد عبد الله">
                </div>
                <div class="group">
                  <label for="email">البريد الإلكتروني</label>
                  <input type="email" id="email" name="email" placeholder="example@gmail.com">
                </div>
              </div>
              <div class="form-group">
                <div class="group">
                  <label for="number"> رقم الهاتف</label>
                  <input type="number" id="number" name="number" placeholder="+966 12 345 6789">
                </div>
                <div class="group">
                  <label for="text"> موضوع الرسالة</label>
                  <input type="text" id="text" name="text" placeholder="الكتاب">
                </div>
              </div>
              <div class="group">
                <label for="message">نص الرسالة</label>
                <textarea type="text" id="message" name="message" placeholder="نص الرسالة"></textarea>
              </div>

              <button type="submit" class="btn rounded"> ارسال</button>
            </form>

          </div>
          <div class="left">
            <h2>تواصل معنا</h2>
            <ul class="y-u-flex y-u-justify-between y-u-flex-col ">
              <li><a href="#"><img src="../../assets/map.svg" alt="خريطة الموقع"> الرياض , المملكة العربية
                  السعودية</a></li>
              <li><a href="#"><img src="../../assets/email.svg" alt="البريد الإلكتروني"> Alaliya@gmail.com </a></li>
              <li><a href="#"> <img src="../../assets/phone.svg" alt="رقم الهاتف">+966 12 345 6789</a></li>
            </ul>
          </div>
        </div>

      </div>
    </section>

    <section class="footer-contect">
      <div class="container y-u-max-w-1200">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3611.903336783503!2d46.70987737489967!3d24.68355808420423!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3e2f0487454990d9%3A0x3650175541c443c4!2sAlaliya%20Library!5e0!3m2!1sar!2ssa!4v1733935615825!5m2!1sar!2ssa"
          width="100%" height="340" style="border:0;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </section>


  </main>


  <y-footer></y-footer>

  <script src="../../js/y-app-init.js"></script>
</body>

</html>
